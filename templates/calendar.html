{% extends "base_app.html" %}
{% block title %}
    Calendar - ScheduX
{% endblock title %}
{% block content %}
    <div class="p-6 md:p-8 flex flex-col h-full overflow-hidden">
        <!-- Header Area -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 flex-shrink-0">
            <div>
                <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                    <span class="p-1.5 rounded-lg bg-cyan-500/10 text-cyan-400">
                        <svg class="w-6 h-6"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke="currentColor"
                             stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </span>
                    Calendar
                </h1>
                <p class="text-slate-400 text-sm mt-1 mb-0">Manage your schedule and upcoming meetings.</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative group mr-2">
                    <input type="text"
                           id="searchEventInput"
                           placeholder="Search events..."
                           class="w-64 lg:w-80 pl-9 pr-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all">
                    <!-- Search Icon -->
                    <svg class="w-4 h-4 text-slate-400 absolute left-3 top-2.5"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                    <button class="px-4 py-1.5 rounded-lg bg-white/10 text-white text-sm font-medium shadow-sm border border-white/5">
                        Week
                    </button>
                    <button class="px-4 py-1.5 rounded-lg text-slate-400 hover:text-white text-sm font-medium transition-colors">
                        Month
                    </button>
                </div>
                <button id="magicEventBtn"
                        class="px-4 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-medium text-sm shadow-lg shadow-cyan-500/25 hover:shadow-cyan-500/40 hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-2 focus:ring-cyan-500/50 flex items-center gap-2">
                    <svg class="w-4 h-4"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Magic Event
                </button>
            </div>
        </div>
        <!-- Calendar Grid -->
        <div id="calendar-container"
             class="flex-1 min-h-0 bg-[#0a0c12]/40 border border-white/5 rounded-2xl overflow-hidden flex flex-col">
            <!-- Week View Container (Default) -->
            <div id="week-view-container"
                 class="flex-1 flex flex-col min-h-0 overflow-hidden">
                <div id="days-header"
                     class="flex border-b border-white/5 flex-shrink-0 bg-[#0a0c12]/80"></div>
                <div id="timeline-grid"
                     class="flex-1 overflow-y-auto relative scrollbar-hide">
                    <div class="absolute left-16 right-0 top-[260px] h-[1px] bg-cyan-500/50 z-20 pointer-events-none hidden"
                         id="current-time-line">
                        <div class="absolute -left-[5px] -top-1 w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
                    </div>
                    <div class="relative min-h-[800px]" id="hours-grid"></div>
                </div>
            </div>
            <!-- Month View Container (Hidden by Default) -->
            <div id="month-view-container"
                 class="hidden flex-1 flex-col min-h-0 overflow-hidden relative">
                <!-- Days of week Header -->
                <div class="grid grid-cols-7 border-b border-white/5 flex-shrink-0 bg-[#0a0c12]/80 text-center"
                     style="display: grid;
                            grid-template-columns: repeat(7, 1fr);
                            width: 100%">
                    <div class="py-3">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Sun</p>
                    </div>
                    <div class="py-3">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Mon</p>
                    </div>
                    <div class="py-3">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Tue</p>
                    </div>
                    <div class="py-3">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Wed</p>
                    </div>
                    <div class="py-3">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Thu</p>
                    </div>
                    <div class="py-3">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Fri</p>
                    </div>
                    <div class="py-3">
                        <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Sat</p>
                    </div>
                </div>
                <!-- Month Grid -->
                <div id="month-grid"
                     class="flex-1 overflow-y-auto grid grid-cols-7 grid-rows-5 divide-y divide-x divide-white/5 bg-transparent min-h-[500px]"
                     style="display: grid;
                            grid-template-columns: repeat(7, 1fr);
                            width: 100%"></div>
            </div>
        </div>
    </div>
    <!-- Magic Event Modal -->
    <div id="magicEventModal"
         class="fixed top-0 left-0 w-full h-full bg-black/50 backdrop-blur-sm z-30 hidden items-start justify-center p-4 pt-32">
        <div class="bg-[#0f1117] border border-white/10 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden animate-[fadeIn_0.2s_ease-out]">
            <div class="p-5 border-b border-white/5 flex items-center justify-between bg-cyan-500/5">
                <h3 class="text-white font-bold flex items-center gap-2">
                    <svg class="w-5 h-5 text-cyan-500"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    Magic Event with AI
                </h3>
                <button id="closeMagicModal"
                        class="text-slate-500 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">What's the event?</label>
                <textarea id="magicEventPrompt"
                          rows="4"
                          placeholder="e.g., Quick sync with design team tomorrow at 10 AM..."
                          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all resize-none mb-4"></textarea>
                <div class="flex justify-end gap-3">
                    <button id="generateMagicEventBtn"
                            class="px-6 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold text-sm transition-all shadow-lg shadow-cyan-500/20 hover:shadow-cyan-500/40">
                        Generate Event
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    {% load static %}
        <script>
            window.eventsData = JSON.parse('{{ events_json|escapejs }}' || '[]');
        </script>
    <script src="{% static 'js/calendar.js' %}"></script>

{% endblock content %}
