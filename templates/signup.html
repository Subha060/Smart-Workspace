{% extends "base.html" %}
{% block title %}
    Create an Account - Smart Workspace
{% endblock title %}
{% block content %}
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
        <!-- Decorative background blobs -->
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-10 animate-blob">
        </div>
        <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-10 animate-blob animation-delay-2000">
        </div>
        <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-10 animate-blob animation-delay-4000">
        </div>
        <div class="max-w-md w-full relative z-10 space-y-8 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white/20 dark:border-white/5 transition-all duration-500 hover:shadow-blue-500/10">
            <div>
                <h2 class="mt-2 text-center text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 tracking-tight">
                    Create an Account
                </h2>
                <p class="mt-3 text-center text-sm text-slate-600 dark:text-slate-400 font-medium">
                    Join Smart Workspace to unlock your next big career move.
                </p>
            </div>
            <form class="mt-8 space-y-6" action="#" method="post">
                {% csrf_token %}
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative group">
                            <label for="first-name" class="sr-only">First name</label>
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors z-10">
                                <svg class="h-5 w-5"
                                     xmlns="http://www.w3.org/2000/svg"
                                     fill="none"
                                     viewBox="0 0 24 24"
                                     stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <input id="first-name"
                                   name="first_name"
                                   type="text"
                                   autocomplete="given-name"
                                   required
                                   class="appearance-none rounded-2xl relative block w-full px-4 py-3 pl-12 border border-slate-200 dark:border-slate-700 placeholder-slate-400 text-slate-900 dark:text-slate-100 bg-slate-50/50 dark:bg-slate-800/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 sm:text-sm transition-all duration-300 backdrop-blur-sm"
                                   placeholder="First name">
                        </div>
                        <div class="relative group">
                            <label for="last-name" class="sr-only">Last name</label>
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors z-10">
                                <svg class="h-5 w-5"
                                     xmlns="http://www.w3.org/2000/svg"
                                     fill="none"
                                     viewBox="0 0 24 24"
                                     stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <input id="last-name"
                                   name="last_name"
                                   type="text"
                                   autocomplete="family-name"
                                   required
                                   class="appearance-none rounded-2xl relative block w-full px-4 py-3 pl-12 border border-slate-200 dark:border-slate-700 placeholder-slate-400 text-slate-900 dark:text-slate-100 bg-slate-50/50 dark:bg-slate-800/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 sm:text-sm transition-all duration-300 backdrop-blur-sm"
                                   placeholder="Last name">
                        </div>
                    </div>
                    <div class="relative group">
                        <label for="email-address" class="sr-only">Email address</label>
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors z-10">
                            <svg class="h-5 w-5"
                                 xmlns="http://www.w3.org/2000/svg"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                        </div>
                        <input id="email-address"
                               name="email"
                               type="email"
                               autocomplete="email"
                               required
                               class="appearance-none rounded-2xl relative block w-full px-4 py-3 pl-12 border border-slate-200 dark:border-slate-700 placeholder-slate-400 text-slate-900 dark:text-slate-100 bg-slate-50/50 dark:bg-slate-800/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 sm:text-sm transition-all duration-300 backdrop-blur-sm"
                               placeholder="Email address">
                    </div>
                    <div class="relative group">
                        <label for="password" class="sr-only">Password</label>
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors z-10">
                            <svg class="h-5 w-5"
                                 xmlns="http://www.w3.org/2000/svg"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input id="password"
                               name="password"
                               type="password"
                               autocomplete="new-password"
                               required
                               class="appearance-none rounded-2xl relative block w-full px-4 py-3 pl-12 border border-slate-200 dark:border-slate-700 placeholder-slate-400 text-slate-900 dark:text-slate-100 bg-slate-50/50 dark:bg-slate-800/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 sm:text-sm transition-all duration-300 backdrop-blur-sm"
                               placeholder="Password">
                    </div>
                    <div class="relative group">
                        <label for="confirm-password" class="sr-only">Confirm Password</label>
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors z-10">
                            <svg class="h-5 w-5"
                                 xmlns="http://www.w3.org/2000/svg"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input id="confirm-password"
                               name="confirm_password"
                               type="password"
                               autocomplete="new-password"
                               required
                               class="appearance-none rounded-2xl relative block w-full px-4 py-3 pl-12 border border-slate-200 dark:border-slate-700 placeholder-slate-400 text-slate-900 dark:text-slate-100 bg-slate-50/50 dark:bg-slate-800/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 sm:text-sm transition-all duration-300 backdrop-blur-sm"
                               placeholder="Confirm password">
                    </div>
                </div>
                <div class="flex items-center">
                    <input id="terms"
                           name="terms"
                           type="checkbox"
                           required
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded bg-slate-50 dark:bg-slate-800 dark:border-slate-600 cursor-pointer transition-colors">
                    <label for="terms"
                           class="ml-2 block text-sm text-slate-700 dark:text-slate-300 cursor-pointer">
                        I agree to the <a href="#"
    class="text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300 underline">Terms and Conditions</a>
                    </label>
                </div>
                <div>
                    <button type="submit"
                            class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-2xl text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transform transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-blue-500/25 overflow-hidden">
                        <div class="absolute inset-0 w-full h-full bg-white/20 transform -skew-x-12 -translate-x-full group-hover:animate-shine text-[0px]">
                        </div>
                        <span class="relative flex items-center">
                            Create Account
                            <svg class="ml-2 -mr-1 w-5 h-5 group-hover:translate-x-1 transition-transform"
                                 fill="currentColor"
                                 viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd">
                                </path>
                            </svg>
                        </span>
                    </button>
                </div>
                <p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
                    Already have an account?
                    <a href="{% url 'login' %}"
                       class="font-bold text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300 transition-colors">
                        Sign in here
                    </a>
                </p>
            </form>
        </div>
    </div>
{% endblock content %}
