{% load static %}
<!-- Sidebar Overlay (mobile) -->
<div id="sidebar-overlay"
     class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 lg:hidden hidden transition-opacity duration-300"></div>
<!-- Sidebar -->
<aside id="sidebar"
       class="fixed top-0 left-0 h-full w-64 z-50 flex flex-col bg-[#0f1117]/95 backdrop-blur-xl border-r border-white/5 shadow-2xl shadow-black/50 transform transition-transform duration-300 ease-in-out -translate-x-full lg:translate-x-0">
    <!-- Logo / App Name -->
    <div class="flex items-center gap-3 px-5 py-6 border-b border-white/5">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/25 flex-shrink-0">
            <svg class="w-5 h-5 text-white"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>
        <div>
            <span class="text-white font-bold text-lg leading-tight tracking-tight">Smart Workspace</span>
            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-medium">Workspace</p>
        </div>
        <!-- Mobile close button -->
        <button id="sidebar-close"
                class="ml-auto lg:hidden text-slate-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5 scrollbar-hide">
        <!-- Main Section -->
        <p class="px-3 pt-1 pb-2 text-[10px] uppercase tracking-widest text-slate-600 font-semibold select-none">Main</p>
        <a href="{% url 'home' %}"
           id="nav-dashboard"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200 relative overflow-hidden">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-blue-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </span>
            <span class="text-sm font-medium">Dashboard</span>
            <span class="ml-auto w-1.5 h-1.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"></span>
        </a>
        <a href="{% url 'chat' %}"
           id="nav-chat"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200 relative overflow-hidden">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-purple-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </span>
            <span class="text-sm font-medium">Chat Assistant</span>
            <span class="ml-auto px-1.5 py-0.5 rounded-full bg-purple-500/20 text-purple-400 text-[10px] font-bold">AI</span>
        </a>
        <a href="{% url 'tasks' %}"
           id="nav-tasks"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-emerald-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
            </span>
            <span class="text-sm font-medium">Tasks</span>
            <span class="ml-auto px-1.5 py-0.5 rounded-full bg-emerald-500/15 text-emerald-400 text-[10px] font-bold">3</span>
        </a>
        <!-- Productivity Section -->
        <p class="px-3 pt-4 pb-2 text-[10px] uppercase tracking-widest text-slate-600 font-semibold select-none">
            Productivity
        </p>
        <a href="{% url 'calendar' %}"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-cyan-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </span>
            <span class="text-sm font-medium">Calendar</span>
        </a>
        <a href="{% url 'email' %}"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-amber-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </span>
            <span class="text-sm font-medium">Email Assistant</span>
            <span class="ml-auto w-2 h-2 rounded-full bg-amber-400 ring-2 ring-amber-400/20"></span>
        </a>
        <a href="{% url 'planner' %}"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-rose-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
            </span>
            <span class="text-sm font-medium">Planner</span>
        </a>
        <!-- History Section -->
        <p class="px-3 pt-4 pb-2 text-[10px] uppercase tracking-widest text-slate-600 font-semibold select-none">History</p>
        <a href="{% url 'activity' %}"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-indigo-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </span>
            <span class="text-sm font-medium">Activity History</span>
        </a>
    </nav>
    <!-- Bottom Section: Profile + Logout -->
    <div class="p-3 border-t border-white/5 space-y-0.5">
        <a href="#"
           id="nav-profile"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200">
            <span class="w-8 h-8 rounded-lg overflow-hidden bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center flex-shrink-0">
                <svg class="w-4.5 h-4.5 text-white"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </span>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-slate-300 truncate">User Profile</p>
                <p class="text-[10px] text-slate-600 truncate">Manage account</p>
            </div>
        </a>
        <a href="#"
           id="nav-logout"
           class="sidebar-link group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-red-400 hover:bg-red-500/5 transition-all duration-200">
            <span class="sidebar-icon w-8 h-8 rounded-lg bg-white/0 group-hover:bg-red-500/10 flex items-center justify-center transition-colors duration-200">
                <svg class="w-4.5 h-4.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </span>
            <span class="text-sm font-medium">Logout</span>
        </a>
    </div>
</aside>
<!-- Mobile hamburger toggle button -->
<button id="sidebar-toggle"
        class="fixed top-4 left-4 z-30 lg:hidden w-10 h-10 rounded-xl bg-[#0f1117]/90 border border-white/10 backdrop-blur-xl flex items-center justify-center text-slate-400 hover:text-white shadow-lg transition-colors duration-200">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
</button>
<script>
  (function () {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const toggle = document.getElementById('sidebar-toggle');
    const close = document.getElementById('sidebar-close');

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
      setTimeout(() => overlay.classList.add('opacity-100'), 10);
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.remove('opacity-100');
      setTimeout(() => overlay.classList.add('hidden'), 300);
    }

    toggle && toggle.addEventListener('click', openSidebar);
    close && close.addEventListener('click', closeSidebar);
    overlay && overlay.addEventListener('click', closeSidebar);

    // Highlight active link based on current URL path
    const links = document.querySelectorAll('.sidebar-link');
    links.forEach(link => {
      if (link.getAttribute('href') === window.location.pathname) {
        link.classList.add('text-white', 'bg-white/5');
        link.classList.remove('text-slate-400');
        const dot = link.querySelector('.ml-auto.w-1\\.5');
        if (dot) dot.classList.remove('opacity-0');
      }
    });
  })();
</script>
