{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="{% block meta_description %}Smart Workspace - Your portal for jobs and recruitment.{% endblock meta_description %}" />
    {% load tailwind_tags %}
    {% tailwind_css %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>
      {% block title %}
        Home Page
      {% endblock title %}
    </title>
  </head>
  <body class="bg-[#f6f6f8] dark:bg-[#111621] text-slate-900 dark:text-slate-100 antialiased">
    {% block content %}
    {% endblock content %}
    <script src="{% static 'src/chat.js' %}" defer></script>
  </body>
</html>
